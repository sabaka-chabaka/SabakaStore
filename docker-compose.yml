services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sabakastore_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=sabakastore;Username=postgres;Password=${POSTGRES_PASSWORD}
      - JwtOptions__SecretKey=${JWT_SECRET}
      - JwtOptions__Issuer=SabakaStore
      - JwtOptions__Audience=SabakaStore
      - JwtOptions__ExpiresHours=24
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: sabakastore_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=sabakastore
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sabakastore"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data: